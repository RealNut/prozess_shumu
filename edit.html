<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>网站内容编辑器</title>
<style>
 body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;max-width:880px;margin:0 auto;padding:26px 18px 60px;color:#1f2328;background:#fafbfc}
 h1{font-size:22px;margin:0 0 4px}
 .hint{background:#eef4ff;border:1px solid #c7d2fe;border-radius:10px;padding:11px 14px;font-size:13px;color:#334;line-height:1.7;margin:10px 0 18px}
 .hint b{color:#1a7f37}
 section{background:#fff;border:1px solid #e1e4e8;border-radius:12px;padding:16px 18px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
 .sec-h{font-size:15px;font-weight:700;margin:0 0 12px;padding-left:9px;border-left:4px solid #0969da}
 .sec-h.m{color:#1a7f37;border-color:#1a7f37}
 .sec-h.d{color:#0969da;border-color:#0969da}
 .field{margin-bottom:13px}
 .field label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:#424a53}
 .field .tip{font-weight:400;color:#8a8f98;font-size:11.5px;margin-left:6px}
 .field input,.field textarea{width:100%;box-sizing:border-box;font-size:13.5px;padding:8px 10px;border:1px solid #d0d7de;border-radius:8px;font-family:inherit}
 .field textarea{height:90px;resize:vertical;line-height:1.6}
 .field textarea.tall{height:150px}
 .actions{position:sticky;bottom:0;background:#fafbfc;padding:12px 0;border-top:1px solid #e1e4e8;display:flex;gap:10px;flex-wrap:wrap}
 .actions button{font-size:14px;padding:9px 16px;border-radius:9px;border:1px solid #d0d7de;background:#fff;cursor:pointer}
 #save{background:#1a7f37;border-color:#1a7f37;color:#fff;font-weight:600}
 #openbtn{display:none;background:#0969da;color:#fff;border-color:#0969da;font-weight:600}
 .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:#1f2328;color:#fff;padding:13px 20px;border-radius:12px;font-size:13.5px;line-height:1.6;max-width:560px;box-shadow:0 8px 28px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.25s;z-index:60;text-align:center}
 .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
 .toast b{color:#9be9a8}
</style></head><body>
<h1>网站内容编辑器</h1>
<div class="hint">在这里统一修改<b>站名、副标题、页脚、各丛书标题/说明</b>等呈现文字（标签与译文不在此处，仍按页面内 ✎ / 🏷️ 方式改）。<br>
改完点 <b>「💾 保存修改」</b> 把内容写回本地 <code>content.json</code>，然后在 <b>WorkBuddy 项目对话</b>里跟我说 <b>「推送」</b>，我就会重新生成并部署上线。</div>

<div id="openbox" style="display:none;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px;margin-bottom:18px;font-size:13.5px">
  无法直接读取 content.json（可能是用 file:// 打开）。请手动打开项目里的 <code>bibliography-site/content.json</code>：
  <div style="margin-top:10px"><button id="openbtn2">📂 打开 content.json 文件</button></div>
</div>

<div id="form"></div>

<div class="actions">
  <button id="save">💾 保存修改</button>
  <button id="download">⬇️ 下载 content.json</button>
  <button id="copy">📋 复制 JSON</button>
  <button id="reload">↻ 重新加载</button>
  <button id="openbtn">📂 打开 content.json（file:// 模式）</button>
</div>

<div class="toast" id="toast"></div>

<script>
let DATA=null;
const TEXTAREA=new Set(['subtitle','footer','note_box','note']);
const TALL=new Set(['note_box','note']);
const LABELS={
  'site.title':'站名（浏览器标签 & 首页大标题）',
  'site.subtitle':'副标题（__TOTAL__ 会被自动替换为总册数）',
  'site.footer':'页脚文字',
  'site.note_box':'书目页说明框（支持 HTML，如 &lt;b&gt; 加粗、&lt;br&gt; 换行）',
  'title':'丛书标题',
  'sub':'副标题（首页卡片下方小字）',
  'note':'丛书说明（书目页「字段：…」那一行）'
};
const SERIES_ORDER=[
  ['p','Duncker &amp; Humblot · 诉讼法丛书 (Prozessrecht)'],
  ['s','Duncker &amp; Humblot · 比较私法研究 (Studien)'],
  ['c','Duncker &amp; Humblot · 民法丛书 (bürgerliches Recht)'],
  ['v','Mohr Siebeck · 程序法 (VVerfR)'],
  ['j','Mohr Siebeck · 私法 (JusPriv)'],
  ['i','Mohr Siebeck · 外国与国际私法 (BtrIPR)']
];
function toast(msg){const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(()=>t.classList.remove('show'),6500);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function load(){
  fetch('content.json').then(r=>{if(!r.ok)throw new Error('http'+r.status);return r.json();})
    .then(d=>{DATA=d;render();})
    .catch(()=>{document.getElementById('openbox').style.display='block';document.getElementById('openbtn').style.display='inline-block';});
}
async function openFile(){
  try{
    const hs=await window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]});
    const f=await hs[0].getFile();const t=await f.text();DATA=JSON.parse(t);render();
    document.getElementById('openbox').style.display='none';
    toast('✅ 已载入 content.json，可以开始编辑。');
  }catch(e){if(e.name!=='AbortError')toast('打开失败：'+e.message);}
}
function buildField(path,val,label,tip){
  const wrap=document.createElement('div');wrap.className='field';
  const lab=document.createElement('label');lab.innerHTML=esc(label)+(tip?'<span class="tip">'+tip+'</span>':'');wrap.appendChild(lab);
  let inp;
  if(TEXTAREA.has(path.split('.').pop())){inp=document.createElement('textarea');if(TALL.has(path.split('.').pop()))inp.className='tall';inp.value=val;}
  else{inp=document.createElement('input');inp.value=val;}
  inp.dataset.path=path;wrap.appendChild(inp);return wrap;
}
function render(){
  const form=document.getElementById('form');form.innerHTML='';
  // 站点
  const s=document.createElement('section');
  let h=document.createElement('div');h.className='sec-h';h.textContent='站点（首页 / 全局）';s.appendChild(h);
  ['title','subtitle','footer','note_box'].forEach(k=>{
    s.appendChild(buildField('site.'+k,DATA.site[k],LABELS['site.'+k],k==='subtitle'?'必要时保留 __TOTAL__':''));
  });
  form.appendChild(s);
  // 丛书
  SERIES_ORDER.forEach(([pre,heading])=>{
    const sec=document.createElement('section');
    const hh=document.createElement('div');hh.className='sec-h '+(pre==='p'||pre==='s'||pre==='c'?'d':'m');hh.innerHTML='丛书：'+heading;sec.appendChild(hh);
    ['title','sub','note'].forEach(k=>{
      sec.appendChild(buildField('series.'+pre+'.'+k,DATA.series[pre][k],LABELS[k],''));
    });
    form.appendChild(sec);
  });
}
function collect(){
  document.querySelectorAll('#form [data-path]').forEach(inp=>{
    const p=inp.dataset.path.split('.');
    if(p[0]==='site')DATA.site[p[1]]=inp.value;
    else if(p[0]==='series')DATA.series[p[1]][p[2]]=inp.value;
  });
}
function serialize(){return JSON.stringify(DATA,null,2);}
function download(){
  const b=new Blob([serialize()],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='content.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
async function save(){
  collect();
  const txt=serialize();
  try{
    const hs=await window.showOpenFilePicker({mode:'readwrite',suggestedName:'content.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});
    const w=await hs[0].createWritable();await w.write(txt);await w.close();
    toast('✅ 已写入本地 <b>content.json</b>。<br>在 <b>WorkBuddy 项目对话</b>里跟我说「<b>推送</b>」，我就会重新生成并部署上线。');
  }catch(e){
    if(e.name==='AbortError')return;
    download();
    toast('当前浏览器不支持直接写文件，已改为<b>下载 content.json</b>。<br>把它放回项目 bibliography-site/ 目录，或发给我，我帮你推送。');
  }
}
document.getElementById('save').onclick=save;
document.getElementById('download').onclick=()=>{collect();download();toast('⬇️ 已下载 content.json');};
document.getElementById('copy').onclick=()=>{collect();if(navigator.clipboard)navigator.clipboard.writeText(serialize());toast('📋 已复制 JSON，可直接发到 WorkBuddy 项目对话里让我推送。');};
document.getElementById('reload').onclick=()=>load();
document.getElementById('openbtn').onclick=openFile;
document.getElementById('openbtn2').onclick=openFile;
load();
</script>
</body></html>
